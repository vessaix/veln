<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VELN | Terminal Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#0969da",
          "tertiary-fixed-dim": "#d0bcff",
          "surface-bright": "#353a3f",
          "inverse-surface": "#dee3e9",
          "on-primary-fixed": "#001a41",
          "surface-container-lowest": "#0a0f13",
          "error-container": "#93000a",
          "on-primary-container": "#ecefff",
          "error": "#ffb4ab",
          "on-tertiary": "#3c0091",
          "inverse-on-surface": "#2c3136",
          "surface-container": "#1b2025",
          "secondary-container": "#414a53",
          "surface-variant": "#30353a",
          "secondary-fixed": "#dae3ef",
          "secondary": "#bec7d2",
          "background": "#0f1419",
          "surface-container-low": "#171c21",
          "on-error": "#690005",
          "primary-fixed": "#d8e2ff",
          "surface-dim": "#0f1419",
          "secondary-fixed-dim": "#bec7d2",
          "on-surface": "#dee3e9",
          "on-secondary": "#29313a",
          "outline": "#8c909f",
          "on-secondary-container": "#b0b9c4",
          "inverse-primary": "#005bc0",
          "on-background": "#dee3e9",
          "surface-tint": "#adc6ff",
          "primary-fixed-dim": "#adc6ff",
          "outline-variant": "#424753",
          "tertiary-container": "#7c4ce6",
          "on-error-container": "#ffdad6",
          "on-secondary-fixed": "#141c25",
          "surface-container-highest": "#30353a",
          "on-tertiary-container": "#f5ecff",
          "on-surface-variant": "#c2c6d6",
          "on-primary": "#002e68",
          "surface-container-high": "#252a30",
          "primary": "#adc6ff",
          "surface": "#0f1419",
          "on-secondary-fixed-variant": "#3f4851",
          "tertiary": "#d0bcff"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Inter"]
        },
        borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"}
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .kinetic-glass {
    background: rgba(23, 28, 33, 0.7);
    backdrop-filter: blur(20px);
  }
  .glow-border-bottom {
    position: relative;
  }
  .glow-border-bottom::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: #adc6ff;
    box-shadow: 0 2px 10px rgba(173, 198, 255, 0.4);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  input:focus + .glow-border-bottom::after {
    opacity: 1;
  }
</style>
<style>
  body {
    min-height: max(884px, 100dvh);
  }
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">

<!-- Top Navigation -->
<header class="w-full sticky top-0 bg-[#0f1419] z-50">
  <div class="flex items-center justify-between px-6 py-4 w-full max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[#adc6ff]" style="font-variation-settings: 'FILL' 1;">terminal</span>
      <span class="font-black tracking-tighter uppercase text-xl text-[#adc6ff]">VELN</span>
    </div>
    <div class="font-mono text-[10px] tracking-[0.2em] text-[#8c909f]">SYSTEM_AUTH_REQUIRED</div>
  </div>
</header>

<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Background Accents -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
  
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 max-w-6xl w-full items-center relative z-10">
    <!-- Hero Branding Column -->
    <div class="lg:col-span-7 space-y-8">
      <div class="space-y-2">
        <span class="font-mono text-[#adc6ff] text-xs tracking-widest uppercase">bhyve VM management platform</span>
        <h1 class="font-black text-5xl md:text-7xl tracking-tighter text-[#dee3e9] leading-none">
          VELN <span class="text-[#adc6ff]">TERMINAL</span>
        </h1>
      </div>
      <p class="text-[#8c909f] max-w-md text-lg leading-relaxed">
        Access high-performance virtualization nodes. Precision-engineered for technical speed and cryptographic security.
      </p>
      <div class="flex gap-4 pt-4">
        <div class="bg-[#171c21] px-4 py-3 rounded-sm border-l-2 border-[#adc6ff]">
          <div class="font-mono text-[10px] text-[#8c909f] uppercase">Node Status</div>
          <div class="font-mono text-sm text-[#dee3e9]">ONLINE</div>
        </div>
        <div class="bg-[#171c21] px-4 py-3 rounded-sm border-l-2 border-[#d0bcff]">
          <div class="font-mono text-[10px] text-[#8c909f] uppercase">Version</div>
          <div class="font-mono text-sm text-[#dee3e9]">v0.1.0</div>
        </div>
      </div>
    </div>
    
    <!-- Login Interface Column -->
    <div class="lg:col-span-5">
      <div class="kinetic-glass border border-[#424753]/15 p-8 md:p-10 rounded-lg shadow-2xl relative">
        <!-- Subtle Corner Accent -->
        <div class="absolute top-0 right-0 w-12 h-12 border-t border-r border-[#adc6ff]/30 rounded-tr-lg"></div>
        
        <form class="space-y-6" onsubmit="handleLogin(event)">
          <!-- API Key Input -->
          <div class="space-y-1">
            <label class="font-mono text-[10px] uppercase tracking-widest text-[#8c909f] px-1" for="api_key">
              API Access Key
            </label>
            <div class="relative">
              <input 
                class="w-full bg-[#171c21] border-none focus:ring-0 text-[#dee3e9] font-mono text-sm py-3 px-4 transition-all"
                id="api_key"
                type="password"
                placeholder="veln-api-key-xxx..."
                required
                autocomplete="off"
              />
              <div class="glow-border-bottom"></div>
            </div>
          </div>
          
          <!-- Error Message Container -->
          <div id="error-message" class="hidden p-3 bg-red-500/10 border border-red-500/30 rounded-sm">
            <p class="font-mono text-[11px] text-red-400" id="error-text"></p>
          </div>
          
          <!-- Submit Button -->
          <button 
            type="submit"
            id="submit-btn"
            class="w-full bg-gradient-to-r from-[#adc6ff] to-[#0969da] text-[#002e68] font-black py-4 px-6 rounded-sm shadow-[0_0_20px_rgba(173,198,255,0.2)] hover:shadow-[0_0_30px_rgba(173,198,255,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group"
          >
            <span id="btn-text">AUTHENTICATE</span>
            <span id="btn-icon" class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">bolt</span>
          </button>
        </form>
        
        <div class="mt-8 flex justify-center">
          <a class="font-mono text-[10px] uppercase tracking-widest text-[#8c909f] hover:text-[#adc6ff] transition-colors" href="https://github.com/vessaix/veln">
            Documentation
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="w-full border-t border-[#424753]/15 bg-[#0f1419]">
  <div class="flex flex-col md:flex-row justify-between items-center px-8 py-6 w-full max-w-screen-2xl mx-auto">
    <div class="font-mono text-[10px] uppercase tracking-widest text-[#8c909f]">
      © <span id="copyright-year"></span> VESSAIX. ALL RIGHTS RESERVED.
    </div>
    <div class="flex gap-8 mt-4 md:mt-0">
      <a class="font-mono text-[10px] uppercase tracking-widest text-[#8c909f] hover:text-[#adc6ff] transition-all" href="https://github.com/vessaix/veln">GitHub</a>
      <a class="font-mono text-[10px] uppercase tracking-widest text-[#8c909f] hover:text-[#adc6ff] transition-all" href="#">Documentation</a>
    </div>
  </div>
</footer>

<!-- Decorative Screen Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://grainy-gradients.vercel.app/noise.svg')] mix-blend-overlay"></div>

<script>
  // Dynamic copyright year
  document.getElementById('copyright-year').textContent = new Date().getFullYear();
  
  // Login handler
  async function handleLogin(event) {
    event.preventDefault();
    
    const apiKey = document.getElementById('api_key').value;
    const btn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const errorDiv = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    
    // Show loading state
    btn.disabled = true;
    btnText.textContent = 'AUTHENTICATING...';
    btnIcon.textContent = 'sync';
    btnIcon.classList.add('animate-spin');
    errorDiv.classList.add('hidden');
    
    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ api_key: apiKey })
      });
      
      const data = await response.json();
      
      if (data.success) {
        localStorage.setItem('veln_api_key', apiKey);
        localStorage.setItem('veln_user', JSON.stringify(data));
        window.location.href = '/dashboard';
      } else {
        throw new Error(data.error || 'Authentication failed');
      }
    } catch (err) {
      btn.disabled = false;
      btnText.textContent = 'AUTHENTICATE';
      btnIcon.textContent = 'bolt';
      btnIcon.classList.remove('animate-spin');
      
      errorText.textContent = err.message;
      errorDiv.classList.remove('hidden');
    }
  }
</script>

</body>
</html>
