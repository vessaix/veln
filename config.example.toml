# VELN Configuration Example with API Authentication

# ZFS pool for VM storage
zfs_pool = "zroot"

# Directory for VM configurations and metadata
vm_root = "/usr/local/vms"

# API Server Configuration
[api]
# Enable API authentication (default: true)
# Set to false to disable authentication (NOT RECOMMENDED for production)
auth_enabled = true

# API Keys
# Format: "api-key-string" = { name = "Description", role = "admin|operator|viewer" }
# Generate secure keys with: openssl rand -hex 32

[api.keys]
# Admin key - Full access to all operations
"veln-admin-7d8f9e2a1b4c5d6e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d" = { 
  name = "Primary Administrator", 
  role = "admin" 
}

# Operator key - Can start/stop VMs, view everything
"veln-operator-1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f" = { 
  name = "DevOps Team", 
  role = "operator" 
}

# Viewer key - Read-only access
"veln-viewer-9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a" = { 
  name = "Monitoring Dashboard", 
  role = "viewer" 
}

# Web Dashboard key
"veln-web-2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b" = { 
  name = "Web UI", 
  role = "admin" 
}

# Example: CI/CD Integration key
"veln-ci-3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c" = { 
  name = "CI/CD Pipeline", 
  role = "operator" 
}
